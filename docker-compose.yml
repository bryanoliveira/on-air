services:
  on-air-server:
    build: ./server
    container_name: on-air-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ON_AIR_API_TOKEN: ${ON_AIR_API_TOKEN:-}
      ON_AIR_TIMEOUT_SECONDS: "300"
    volumes:
      - on-air-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  on-air-data:
