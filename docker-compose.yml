services:
  on-air-server:
    build: ./server
    container_name: on-air-server
    restart: unless-stopped
    ports:
      - "${ON_AIR_PORT_BIND:-8080:8080}"
    environment:
      ON_AIR_API_TOKEN: ${ON_AIR_API_TOKEN:-}
      ON_AIR_TIMEOUT_SECONDS: "300"
      ON_AIR_HOOKS: ${ON_AIR_HOOKS:-}
      ON_AIR_HOMEASSISTANT_URL: ${ON_AIR_HOMEASSISTANT_URL:-}
      ON_AIR_HOMEASSISTANT_TOKEN: ${ON_AIR_HOMEASSISTANT_TOKEN:-}
      ON_AIR_HOMEASSISTANT_LIGHT_ENTITY_ID: ${ON_AIR_HOMEASSISTANT_LIGHT_ENTITY_ID:-}
      ON_AIR_HOMEASSISTANT_TIMEZONE: ${ON_AIR_HOMEASSISTANT_TIMEZONE:-America/Sao_Paulo}
      ON_AIR_HOMEASSISTANT_CAMERA_COLOR: ${ON_AIR_HOMEASSISTANT_CAMERA_COLOR:-255,0,0}
      ON_AIR_HOMEASSISTANT_MIC_COLOR: ${ON_AIR_HOMEASSISTANT_MIC_COLOR:-0,255,0}
      ON_AIR_HOMEASSISTANT_NIGHT_COLOR: ${ON_AIR_HOMEASSISTANT_NIGHT_COLOR:-255,160,0}
      ON_AIR_HOMEASSISTANT_BRIGHTNESS: ${ON_AIR_HOMEASSISTANT_BRIGHTNESS:-}
      ON_AIR_HOMEASSISTANT_TIMEOUT_SECONDS: ${ON_AIR_HOMEASSISTANT_TIMEOUT_SECONDS:-5}
    volumes:
      - on-air-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  on-air-data:
